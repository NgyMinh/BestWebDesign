<!DOCTYPE html>
<html lang="en" dir="ltr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Qũy từ thiện MVP - Về chúng tôi</title>
		<!-- Favicon -->
		<link rel="icon" type="image/x-icon" href="../assets/img/logo.png" />
		<!-- Nhúng font chữ -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link rel="stylesheet" href="../assets/css/ui/style.css"/>

			href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&display=swap"
			rel="stylesheet"
		/>
		<!-- Nhúng font awesome -->
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
			integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
			crossorigin="anonymous"
			referrerpolicy="no-referrer"
		/>
		<!-- Nhúng boxicons -->
		<script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
		<!-- CSS của AOS -->
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" />
		<!-- Link Bootstrap-->
		<link rel="stylesheet" href="../assets/bootstrap/css/bootstrap.min.css" />
		<script src="../assets/bootstrap/js/bootstrap.bundle.min.js"></script>
		<!-- Link CSS -->
		<link rel="stylesheet" href="../assets/css/ui/common.css" />
		<link rel="stylesheet" href="../assets/css/ui/about.css" />
		<link rel="stylesheet" href="../assets/css/components/messenger.css" />
		<link rel="stylesheet" href="../assets/css/components/search-style.css" />
		<link rel="stylesheet" href="../assets/css/components/stories-style.css" />
		<link rel="stylesheet" href="../assets/css/ui/stories.css" />
        <!--Link Icons-->
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"/>
        <script src="../assets/js/chatbox.js" defer></script>
	</head>
    <body>
        <button class="chatbot-toggler">
            <span class="material-symbols-outlined">mode_comment</span>
            <span class="material-symbols-outlined">close</span>
        </button>
        <div class="chatbot">
            <header>
                <h2>Chatbot</h2>
                <span class="close-btn material-symbols-outlined">close</span>
            </header>
            <ul class="chatbox">
                <li class="chat incoming">
                    <span class="material-symbols-outlined">smart_toy</span>
                    <p>Xin chào💕 <br> MVP có thể giúp gì bạn hôm nay</p>
                </li>
            </ul>
            <div class="chat-input">
                <textarea placeholder="Enter a message..." required></textarea>
                <span id="send-btn" class="material-symbols-outlined">send</span>
            </div>
        </div>
    </body>
</html>
